name: Compile and test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
    inputs: {}

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        opam_file:
          - 'rocq-certirocq.opam'
        image:
          - 'mattam82/metacoq:metarocq-1.5.1-rocq-9.1'
      fail-fast: false  # don't stop jobs if one fails
    steps:
      - uses: actions/checkout@v3
        with:
           submodules: false
      - uses: coq-community/docker-coq-action@v1
        with:
          custom_image: ${{ matrix.image }}
          opam_file: ${{ matrix.opam_file }}
          before_install: | # comment back in if MetaRocq commit changes
            startGroup "fix permission issues"
              sudo chown -R 1000:1000 .
            endGroup
          before_script: |
            startGroup "Install more dependencies"
              # TODO: install node with apt once a more recent version is available for debian. We need at least version 22.
              sudo apt-get install --yes wabt
              # install node via https://github.com/nvm-sh/nvm
              curl https://raw.githubusercontent.com/nvm-sh/nvm/master/install.sh | bash
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
              nvm install 22.1.0
              node --version
            endGroup
            startGroup "fix permission issues"
              sudo chown -R 1000:1000 .
            endGroup
            startGroup "Copy repo (for later testing)"
              cp -r `pwd` ~/repo
            endGroup
          after_script: |
            startGroup "List installed packages"
              opam list
            endGroup
            startGroup "Run tests"
              ulimit -s unlimited
              make -C ~/repo plugin && make -C ~/repo/tests all
            endGroup
            startGroup "Test bootstrapped plugins"
              cd ~/repo && ./configure.sh global
              make -C ~/repo/bootstrap test
            endGroup
